<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/backraond.css">

</head>

<body>
  <div class="box">
    <span class="borderLine"></span>
    <form onsubmit="singIn()">
      <h2>Sign In</h2>
      <div class="inputBox">
        <input type="text" required id="name">
        <span>Username</span>
        <i></i>
      </div>
      <div class="inputBox">
        <input type="email" required id="email">
        <span>Email</span>
        <i></i>
      </div>
      <div class="inputBox">
        <input type="password" pattern="[0-9]{9}" required id="password">
        <span>Password</span>
        <i></i>
      </div>
      <div class="links">
        <a href="#">Signup</a>
      </div>
      <input type="submit" value="Login">
    </form>
  </div>
  </div>

  <script src="../js/login.js"></script>


</body>

</html>
